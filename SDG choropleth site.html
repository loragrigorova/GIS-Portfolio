
<!DOCTYPE html>
<html lang="en">
<head>
	<base target="_top">
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	
	<title>SDG Map with Leaflet</title>
	
	<link rel="shortcut icon" type="image/x-icon" href="docs/images/favicon.ico" />

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

	<style>
		html, body {
			height: 100%;
			margin: 0;
		}
		.leaflet-container {
			max-width: 100%;
			max-height: 100%;
		}
		#map {
			display: block;
			height: 550px;
			width: 80%;
			margin: 2rem auto;
		}
		@font-face {
    font-family: 'Bahnschrift';
    src: url('bahnschrift.woff2') format('woff2'),
         url('bahnschrift.woff') format('woff');
    font-weight: 300 900; 
    font-style: normal;
    font-display: swap;
}

body {
    font-family: 'Bahnschrift', 'Segoe UI', Arial, sans-serif;
}

	</style>

	<style>
.info { padding: 6px 8px; font: 14px/16px Arial, Helvetica, sans-serif; background: white; background: rgba(255,255,255,0.8); box-shadow: 0 0 15px rgba(0,0,0,0.2); border-radius: 5px; } .info h4 { margin: 0 0 5px; color: #777; }
.legend { text-align: left; line-height: 18px; color: #555; } .legend i { width: 18px; height: 18px; float: left; margin-right: 8px; opacity: 0.7; }</style>


</head>
<body>

<div id='map'></div>
<script type="text/javascript" src="SDG_choropleth_data.js"></script>
<script type="text/javascript">

	const map = L.map('map', {
		center: [15,5],
		zoom: 2,
		minZoom: 2,
		maxZoom: 7,
		maxBounds: [[-90, -180], [90,180]],
		maxBoundsViscosity: 1.0,
		noWrap: true
	});

//UPDATE above - notice the SDG15v3.js file - that is my geometry file - replace that file with your own!
//call the basemap you want to use
	const tiles = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
		maxZoom: 19,
		attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
	}).addTo(map);

	// control that shows attribute info on hover
	const info = L.control();

	info.onAdd = function (map) {
		this._div = L.DomUtil.create('div', 'info');
		this.update();
		return this._div;
	};

		//UPDATE to call your own data for the interactivity- the name after "props" is the attribute name - look in your js file to find the attribute to call
		// change class breaks and color depending on your values //UPDATE for our own legend - use colorbrewer.org for ideas for colors
		//UPDATE legend to match the classes you coded - and the source of your data needs to reference the correct link
	info.update = function (props) {
		const contents = props ? `<b>${props.nam_en}</b><br />${props.SDG_field} % of women in parliament` : 'Hover over a state';
		this._div.innerHTML = `<h4>15.1.1 Percentage of women in parliament</h4>${contents}`;
	};

	info.addTo(map);


	
	
	function getColor(d) {
		return d > 40 ? '#810f7c' :
			   d > 30 ? '#8856a7' :
			   d > 20 ? '#8c96c6' :
			   d > 10 ? '#a0bed8' :
			   d > 0  ? '#bcd0eb' :
			   d < 0  ? '#969c9e' : 
						'#f7fcf5';
	}

//update the fill color to your variable 
	function style(feature) {
		return {
			weight: 1.2,
			opacity: 1,
			color: '#211C1B',
			dashArray: '0',
			fillOpacity: 0.7,
			fillColor: getColor(feature.properties.SDG_field)
		};
	}

	function highlightFeature(e) {
		const layer = e.target;

		layer.setStyle({
			weight: 5,
			color: '#666',
			dashArray: '',
			fillOpacity: 0.7
		});

		layer.bringToFront();

		info.update(layer.feature.properties);
	}

	/* global statesData */ //UPDATE nationData
	const geojson = L.geoJson(nationData, {
		style,
		onEachFeature
	}).addTo(map);

	function resetHighlight(e) {
		geojson.resetStyle(e.target);
		info.update();
	}

	function zoomToFeature(e) {
		map.fitBounds(e.target.getBounds());
	}

	function onEachFeature(feature, layer) {
		layer.on({
			mouseover: highlightFeature,
			mouseout: resetHighlight,
			click: zoomToFeature
		});
	}

	map.attributionControl.addAttribution('SDG data &copy; <a href="https://unstats-undesa.opendata.arcgis.com/">UN SDG DataHub</a>');




	



	const legend = L.control({position: 'bottomright'});

    legend.onAdd = function (map) {

        const div = L.DomUtil.create('div', 'info legend');
        // Define the thresholds for your classes
        const grades = [0, 10, 20, 30, 40]; 
        const labels = [];
        let from, to;

        for (let i = 0; i < grades.length; i++) {
            from = grades[i];
            to = grades[i + 1];

            // If it's the last item in the array, set 'to' to 63.8
            const rangeLabel = to ? `${from}&ndash;${to}` : `${from}&ndash;63.8`;
            
            labels.push(`<i style="background:${getColor(from + 1)}"></i> ${rangeLabel}`);
        }

        labels.push(`<i style="background:#FFFFFF; border: 1px solid #ccc;"></i> No Data`);

        div.innerHTML = labels.join('<br>');
        return div;
    };



	legend.addTo(map);


</script>
</body>
</html>
